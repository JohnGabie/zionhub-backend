services:
  # ---------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: zionhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rotina_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rotina_password}
      POSTGRES_DB: ${POSTGRES_DB:-rotina_inteligente_db}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zionhub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rotina_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ---------------------------------------------------------------
  # Backend (FastAPI)
  # network_mode: host — acesso direto ao hardware local (Tuya/SNMP)
  # ---------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: zionhub_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    network_mode: host
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rotina_user}:${POSTGRES_PASSWORD:-rotina_password}@localhost:5433/${POSTGRES_DB:-rotina_inteligente_db}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      TUYA_API_KEY: ${TUYA_API_KEY:-}
      TUYA_API_SECRET: ${TUYA_API_SECRET:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ---------------------------------------------------------------
  # Frontend apps
  # Cada app serve na porta 80 internamente; o nginx proxy faz o roteamento.
  # ---------------------------------------------------------------

  # rotina_inteligente — app principal de automação
  rotina:
    build:
      context: ./apps/rotina_inteligente
      dockerfile: Dockerfile
    container_name: zionhub_rotina
    restart: unless-stopped
    networks:
      - zionhub_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # mix_page — app do mixer de áudio
  mix:
    build:
      context: ./apps/mix_page
      dockerfile: Dockerfile
    container_name: zionhub_mix
    restart: unless-stopped
    networks:
      - zionhub_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # menu — hub central (login + listagem de módulos)
  menu:
    build:
      context: ./apps/menu
      dockerfile: Dockerfile
    container_name: zionhub_menu
    restart: unless-stopped
    networks:
      - zionhub_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # marketing — site do ZionHub (zionhub.app)
  # TODO: mover para repo separado (zionhub-marketing) — fora do escopo desta etapa
  # marketing:
  #   build:
  #     context: ./apps/marketing
  #     dockerfile: Dockerfile

  # ---------------------------------------------------------------
  # Nginx Proxy — roteamento multi-domínio
  # Expõe porta 8080 (HTTP); em produção use 80 + TLS via certbot
  # ---------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: zionhub_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zionhub_network
    depends_on:
      - rotina
      - mix
      - menu
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

volumes:
  postgres_data:

networks:
  zionhub_network:
    driver: bridge
