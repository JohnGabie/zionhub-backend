# =========================================================================
# ZionHub — Nginx para sites estáticos das igrejas
# =========================================================================
#
# Estratégia: cada site de igreja é um bloco server separado.
# Os arquivos ficam em /var/www/landpages/{dominio}/
#
# Para adicionar um novo site de igreja:
#   bash infrastructure/scripts/add-church-site.sh {dominio}
#
# Para TLS (produção):
#   certbot --nginx -d {dominio} -d www.{dominio}
# =========================================================================

# -------------------------------------------------------------------------
# Exemplo 1: quinquas.com.br
# -------------------------------------------------------------------------
server {
    listen 80;
    server_name quinquas.com.br www.quinquas.com.br;
    root /var/www/landpages/quinquas.com.br;
    index index.html;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # SPA routing — todas as rotas entregam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (1 ano)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

